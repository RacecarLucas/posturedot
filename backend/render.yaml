services:
  - type: web
    name: posturedot-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/posturedot
    branch: main
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        value: "sqlite:////app/data/posturedot.db"
    disk:
      name: posturedot-data
      mountPath: /app/data
      sizeGB: 1
